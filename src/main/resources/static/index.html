<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor Online • Spring Boot</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #fff;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-weight: bold;
            font-size: 18px;
            color: #22c55e;
        }

        .status-global {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #22c55e;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* MAIN */
        .main {
            padding: 40px;
            max-width: 1200px;
            margin: auto;
        }

        .title {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card img {
            width: 50px;
            margin-bottom: 15px;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .online {
            color: #22c55e;
        }

        .offline {
            color: #ef4444;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
            margin-top: 40px;
        }

        /* BADGE */
        .badge {
            display: inline-block;
            background: #22c55e;
            color: #000;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">Spring Boot API</div>
    <div class="status-global">
        <div class="pulse"></div>
        Sistema Online
    </div>
</div>

<div class="main">

    <div class="title">🚀 Servidor em execução</div>
    <div class="subtitle">Sua aplicação está rodando perfeitamente.</div>

    <div class="grid">

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/4248/4248443.png">
            <h3>API REST</h3>
            <div class="status online">✔ Online</div>
            <div class="badge">Spring Boot</div>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/2772/2772128.png">
            <h3>Banco de Dados</h3>
            <div class="status online">✔ Conectado</div>
            <div class="badge">MySQL / JPA</div>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png">
            <h3>Autenticação</h3>
            <div class="status online">✔ Ativo</div>
            <div class="badge">Security</div>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/906/906175.png">
            <h3>Deploy</h3>
            <div class="status online">✔ Produção</div>
            <div class="badge">Servidor OK</div>
        </div>

    </div>

</div>

<div class="footer">
    Desenvolvido com Java + Spring Boot • Curso Nélio Alves
</div>

</body>
</html>
